# /etc/nginx/conf.d/lhams.conf
# React 정적 빌드 배포 + JSON 로그 Alias 연결
server {
    listen 80;
    server_name _;

    root /mail/lhams_project/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Watchdog 에이전트가 적재하는 실시간 감사 JSON
    location = /lhams_audit.json {
        alias /mail/lhams_project/frontend/public/lhams_audit.json;
        add_header Cache-Control "no-store";
    }

    # 관리자 API (감시 경로 / 격리소 / 무시 규칙) — Flask 백그라운드 스레드
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
    }
}
