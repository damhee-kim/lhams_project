      <div class="top-right">
        <div class="live"><i class="pulse" id="connDot"></i><span id="connLabel">실시간 연결 시도 중…</span></div>

      </div>

</div>
<div id="toast"></div>
<script>
/* Crinity Insight — 실행 가능한 데모 프론트엔드 (v2.0)
 * 백엔드: FastAPI (insight/backend). 4대 물리 장비의 Edge Agent만 서버측에서
 * 시뮬레이션하고, 그 외 모든 통신(GET/POST/PUT/SSE)은 실제 HTTP 왕복이다.
 * crinity_insight_admin.html 프로토타입과 화면 구조·CSS는 동일하게 유지하고
 * §1 DATA/§2 UTIL 이하 로직만 실 API 연동으로 교체했다. */

/* host는 하드코딩하지 않는다 — Webmail은 이 서버 자신(로컬), 나머지 3개는
 * 서버가 실제로 보관 중인 값(GET /api/v1/settings/node-endpoints)으로 채워진다
 * (applyNodeEndpointsToNodes 참고). 로드 전까지는 "미설정"으로 표시. */
const NODES = [
  {id:"Webmail",     name:"웹메일",       host:"127.0.0.1 (로컬)", color:"var(--webmail)", hex:"#4C8DFF"},
  {id:"SpamBreaker", name:"스팸브레이커", host:"미설정",           color:"var(--spam)",    hex:"#F7B32B"},
  {id:"MailBreaker", name:"메일브레이커", host:"미설정",           color:"var(--mailbrk)", hex:"#FF5D5D"},
  {id:"Archiving",   name:"아카이빙",     host:"미설정",           color:"var(--archive)", hex:"#35C98E"},
];
const nodeById = id => NODES.find(n=>n.id===id);
const CONFIGURABLE_NODES = ["SpamBreaker","MailBreaker","Archiving"]; // 웹메일은 이 서버 자신이라 IP·Port 설정 불필요

let health = Object.fromEntries(NODES.map(n=>[n.id,{cpu:0,mem:0,disk:0,queue:0}]));
let nodeEndpoints = {}; // {SpamBreaker:{host,port}, ...} — 서버에서 로드
let nodeConnected = {Webmail:true, SpamBreaker:null, MailBreaker:null, Archiving:null}; // null=아직 미확인
let alerts = [];
let thresholds = {disk:90, queue:1000, cpu:85};
let webhookCfg = {url:''};
let sosCfg = {dir:'/var/lib/insight/sos-packages', retention_days:30, max_gb:50, used_gb:0};

function getAdminToken(){ return localStorage.getItem('insightAdminToken') || ''; }
function focusAdminTokenInput(){ $('#adminTokenInput')?.focus(); }

async function api(path, opts){
  opts = {...(opts||{})};
  const method = (opts.method || 'GET').toUpperCase();
  if(method !== 'GET'){
    opts.headers = {...(opts.headers||{}), 'X-Admin-Token': getAdminToken()};
  }
  const res = await fetch(path, opts);
  let body = null;
  try{ body = await res.json(); }catch(e){ /* no body */ }
  if(res.status===401){
    focusAdminTokenInput();
    throw new Error('관리자 토큰이 필요합니다 (좌측 하단에 입력하세요).');
  }
  if(res.status===429){
    throw new Error('요청이 너무 잦습니다 — 잠시 후 다시 시도하세요.');
  }
  if(!res.ok){ throw new Error((body && body.detail) || `HTTP ${res.status}`); }
  return body;
}

const $ = s => document.querySelector(s);
const el = (tag, cls, html) => {const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;};
const stateChip = s => ({
  ARCHIVED:'<span class="chip pass">보관 완료</span>', PASS:'<span class="chip pass">통과</span>',
  QUARANTINED:'<span class="chip crit">격리됨</span>', DELAYED:'<span class="chip warn">지연</span>',
  PENDING:'<span class="chip pending">미도달</span>', RELEASED:'<span class="chip info">해제됨</span>',
}[s]||s);
function toast(msg, kind){ const t=el('div','toast-item '+(kind||''), msg); $('#toast').appendChild(t); setTimeout(()=>t.remove(), 3200); }
function sevColor(s){return s==='CRITICAL'?'var(--crit)':s==='WARNING'?'var(--warn)':'var(--webmail)';}

/* ================= 뷰 렌더링 ================= */
const content = $('#content');
const VIEW_TITLES = {overview:"관제 현황", journey:"메일 사전 추적", sos:"SOS 로그 패키징", alert:"사전 경보 설정", arch:"시스템 아키텍처 (3-Tier)", dev:"구현 현황 (LIVE)"};
const views = {};
let currentView = 'overview';

/* ===== 관제 현황 ===== */
views.overview = () => {
  const v = el('div','view active');
  v.innerHTML = `
    <div class="card node-endpoints-card">
      <h3>장비 연결 설정 (IP · Port) — 실제 TCP 연결로 통신 여부 판정</h3>
      <div id="nodeEndpointRows" class="ep-rows"></div>
      <div class="hint section-gap">스팸브레이커·메일브레이커·아카이빙은 고객사마다 실제 장비의 IP·Port가 다르므로 직접 입력합니다. 저장하면 서버가 그 주소로 <b>실제 TCP 연결을 시도</b>해 통신 가능 여부를 판정하고, 이후 5초 주기로 계속 재확인합니다(연결이 끊기거나 복구되면 경보에도 기록됩니다). 웹메일은 이 서버 자신이므로 설정이 필요 없습니다.</div>
    </div>
    <div class="grid4" id="healthCards"></div>
    <div class="grid2 section-gap">
      <div class="card">
        <h3>24시간 메일 처리량 · 차단 현황 (FR-07)</h3>
        <div class="chart" id="thruChart"></div>
        <div class="chart-x" id="thruX"></div>
        <div class="legend">
          <span><i style="background:var(--webmail)"></i>정상 처리</span>
          <span><i style="background:var(--crit)"></i>격리/차단</span>
        </div>
      </div>
      <div class="card">
        <h3>실시간 경보 피드 (FR-08 · Slack/Teams 연동)</h3>
        <div class="feed" id="alertFeed"></div>
      </div>
    </div>`;
  content.replaceChildren(v);
  renderNodeEndpointRows(); renderHealth(); renderFeed();
  fetchHourlyStats();
};

function connChip(nid){
  const c = nodeConnected[nid];
  if(!CONFIGURABLE_NODES.includes(nid)) return '';
  return c===true ? '<span class="chip pass">연결됨</span>'
       : c===false ? '<span class="chip crit">연결 끊김</span>'
       : '<span class="chip pending">확인 중</span>';
}

function renderNodeEndpointRows(){
  const wrap = $('#nodeEndpointRows'); if(!wrap) return;
  wrap.replaceChildren(...CONFIGURABLE_NODES.map(nid=>{
    const n = nodeById(nid);
    const ep = nodeEndpoints[nid] || {host:'', port:''};
    const hostVal = ep.host || '';
    const portVal = (ep.port===null || ep.port===undefined) ? '' : ep.port;
    const row = el('div','ep-row');
    row.innerHTML = `
      <div class="ep-name"><i class="ep-dot" style="background:${n.hex}"></i>${n.name}</div>
      <input class="ep-input" data-f="host" value="${hostVal}" placeholder="IP 또는 호스트명을 입력하세요 (예: 10.10.1.12)" spellcheck="false">
      <input class="ep-input" data-f="port" type="number" min="1" max="65535" value="${portVal}" placeholder="Port">
      <span data-badge>${ep.host ? connChip(nid) : '<span class="chip pending">미설정</span>'}</span>
      <button class="btn ghost" data-save>저장 · 연결 확인</button>`;
    row.querySelector('[data-save]').onclick = ()=> saveNodeEndpoint(nid, row);
    return row;
  }));
}

async function saveNodeEndpoint(nid, row){
  const btn = row.querySelector('[data-save]');
  const host = row.querySelector('[data-f="host"]').value.trim();
  const port = +row.querySelector('[data-f="port"]').value;
  btn.disabled = true; btn.textContent = '확인 중…';
  try{
    const r = await api(`/api/v1/settings/node-endpoints/${nid}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({host, port})});
    nodeEndpoints[nid] = {host:r.host, port:r.port};
    nodeConnected[nid] = r.connected;
    applyNodeEndpointsToNodes();
    renderNodeEndpointRows(); renderHealth();
    toast(`${n_name(nid)} 저장 완료 → ${r.host}:${r.port} · ${r.connected?'연결됨':'연결 안 됨(응답 없음)'}`, r.connected?'ok':'warn');
  }catch(e){ toast('저장 실패: '+e.message, 'err'); }
  finally{ btn.disabled=false; btn.textContent='저장 · 연결 확인'; }
}
function n_name(nid){ return nodeById(nid)?.name || nid; }

function applyNodeEndpointsToNodes(){
  for(const nid of CONFIGURABLE_NODES){
    const n = nodeById(nid), ep = nodeEndpoints[nid];
    if(n && ep && ep.host) n.host = `${ep.host}:${ep.port}`;
  }
}

function renderHealth(){
  const wrap = $('#healthCards'); if(!wrap) return;
  wrap.replaceChildren(...NODES.map(n=>{
    const h = health[n.id];
    const disconnected = CONFIGURABLE_NODES.includes(n.id) && nodeConnected[n.id]===false;
    const unknown = CONFIGURABLE_NODES.includes(n.id) && nodeConnected[n.id]===null;
    const cls = p => p>=90?'hot':p>=80?'warm':'';
    const qcls = h.queue>=1000?'hot':h.queue>=500?'warm':'';
    const card = el('div','card node-card');
    card.style.setProperty('--nc', n.color);
    if(disconnected) card.style.opacity = '.55';
    const statusChip = disconnected ? '<span class="chip crit">연결 끊김</span>'
      : unknown ? '<span class="chip pending">확인 중</span>'
      : (h.disk>=90||h.queue>=1000?'<span class="chip crit">경보</span>':h.disk>=80?'<span class="chip warn">주의</span>':'<span class="chip pass">정상</span>');
    card.innerHTML = `
      <div class="name">${n.name}<span class="st">${statusChip}</span></div>
      <div class="host">${n.id} · ${n.host}</div>
      <div class="gauges">
        ${[['CPU',h.cpu],['MEM',h.mem],['DISK',h.disk]].map(([k,p])=>`
          <div class="gauge"><span class="lbl">${k}</span>
            <div class="bar"><i class="${cls(p)}" style="width:${p}%"></i></div>
            <span class="val">${p}%</span></div>`).join('')}
      </div>
      <div class="queue-line"><span class="hint">메일 큐 대기</span><span class="q ${qcls}">${h.queue.toLocaleString()}<small style="font-size:11px;color:var(--dim)"> 건</small></span></div>
      ${disconnected?'<div class="hint" style="margin-top:8px;color:var(--crit)">IP·Port 응답 없음 — 마지막 확인된 값입니다</div>':''}`;
    return card;
  }));
}

async function fetchHourlyStats(){
  try{
    const s = await api('/api/v1/stats/hourly');
    renderChart(s);
  }catch(e){ /* 차트는 실패해도 나머지 화면에 영향 없음 */ }
}

function renderChart(s){
  const c = $('#thruChart'), x=$('#thruX'); if(!c) return;
  const data = s.processed, blk = s.blocked;
  const max = Math.max(...data, 1);
  c.replaceChildren(...data.map((d,i)=>{
    const col = el('div','col');
    const dh = Math.max(3, d/max*100), bh = Math.max(blk[i]?2:0, blk[i]/max*100);
    col.innerHTML = `<div class="b blk" style="height:${bh}%"></div><div class="b" style="height:${dh}%"></div>`;
    col.title = `${i}시 → 처리 ${d}건 / 격리 ${blk[i]}건`;
    if(i===s.hour) col.style.outline = '1px dashed var(--webmail)';
    return col;
  }));
  x.replaceChildren(...data.map((_,i)=> el('span',null, i%4===0? String(i).padStart(2,'0') : '')));
}

function renderFeed(){
  const f = $('#alertFeed'); if(!f) return;
  if(!alerts.length){ f.replaceChildren(el('div','empty','아직 발생한 경보가 없습니다.')); return; }
  f.replaceChildren(...alerts.slice(0,20).map(a=>{
    const it = el('div','feed-item');
    it.innerHTML = `<i class="sev" style="background:${sevColor(a.sev)}"></i>
      <div><b>[${a.sev}] ${nodeById(a.node)?.name||a.node}</b> → ${a.msg}
      <div class="t">${a.t} · 발송: ${a.ch}</div></div>`;
    return it;
  }));
}

/* ===== 메일 사전 추적 ===== */
let jFilter = 'ALL', jKeyword = '', selectedMsgId = null, JOURNEYS = [];
views.journey = () => {
  const v = el('div','view active');
  v.innerHTML = `
    <div class="card">
      <div class="searchbar">
        <input type="text" id="jSearch" placeholder="Message-ID, 발신자, 수신자, 제목 키워드로 검색 (GET /api/v1/journeys?keyword=)" value="${jKeyword}">
        <button class="btn" id="jSearchBtn">여정 검색</button>
      </div>
      <div class="filters" id="jFilters">
        ${[['ALL','전체'],['QUARANTINED','격리'],['DELAYED','지연'],['ARCHIVED','정상 보관']].map(([k,l])=>
          `<button class="fchip ${jFilter===k?'on':''}" data-f="${k}">${l}</button>`).join('')}
      </div>
      <div class="jlist" id="jList"></div>
    </div>
    <div class="card journey-detail" id="jDetail"></div>`;
  content.replaceChildren(v);
  $('#jSearchBtn').onclick = ()=>{ jKeyword=$('#jSearch').value.trim(); refreshJourneys(); };
  $('#jSearch').addEventListener('keydown', e=>{ if(e.key==='Enter'){ jKeyword=e.target.value.trim(); refreshJourneys(); }});
  $('#jFilters').querySelectorAll('.fchip').forEach(b=> b.onclick=()=>{ jFilter=b.dataset.f; views.journey(); });
  refreshJourneys();
};

async function refreshJourneys(){
  try{
    const q = new URLSearchParams({keyword:jKeyword, status:jFilter, limit:'100'});
    const res = await api('/api/v1/journeys?'+q.toString());
    JOURNEYS = res.items;
  }catch(e){ toast('여정 목록 조회 실패: '+e.message,'err'); JOURNEYS = []; }
  if(!JOURNEYS.find(j=>j.message_id===selectedMsgId)) selectedMsgId = JOURNEYS[0]?.message_id ?? null;
  renderJList(); renderJDetail();
}

function miniLine(j){
  return `<div class="mini-line">${j.nodes.map((s,i)=>{
    const n=nodeById(s.node);
    const c = s.status==='PENDING' ? 'var(--line)' : s.status==='QUARANTINED' ? 'var(--crit)' : s.status==='DELAYED' ? 'var(--warn)' : n.color;
    const seg = i<j.nodes.length-1 ? `<i class="ms" style="background:${s.status==='PENDING'?'var(--line-soft)':c}"></i>` : '';
    return `<i class="md" style="background:${c};${s.status==='PENDING'?'opacity:.35':''}"></i>${seg}`;
  }).join('')}</div>`;
}

function renderJList(){
  const list = $('#jList'); if(!list) return;
  if(!JOURNEYS.length){ list.replaceChildren(el('div','empty','조건에 해당하는 메일 여정이 없습니다. 키워드나 상태 필터를 조정해 보세요.')); return; }
  list.replaceChildren(...JOURNEYS.map(j=>{
    const r = el('button','jrow'+(selectedMsgId===j.message_id?' sel':''));
    r.innerHTML = `
      <div>${stateChip(j.state)}</div>
      <div><div class="subj">${j.meta.subject}</div><div class="from">${j.meta.sender} → ${j.meta.recipient}</div></div>
      ${miniLine(j)}
      <div class="time">${j.meta.received_at}</div>`;
    r.onclick = ()=>{ selectedMsgId=j.message_id; renderJList(); renderJDetail(); };
    return r;
  }));
}

function renderJDetail(){
  const d = $('#jDetail'); if(!d) return;
  const j = JOURNEYS.find(x=>x.message_id===selectedMsgId);
  if(!j){ d.innerHTML='<div class="empty">목록에서 메일을 선택하면 사전 타임라인이 표시됩니다.</div>'; return; }

  const stations = j.nodes.map((s)=>{
    const n = nodeById(s.node);
    const cls = s.status==='QUARANTINED' ? 'blocked' : s.status==='PENDING' ? 'pending' : 'reached';
    const st = el('div',`station ${cls}`);
    st.style.setProperty('--sc', s.status==='DELAYED' ? 'var(--warn)' : n.color);
    st.innerHTML = `<div class="s-dot"></div>
      <div class="s-name" style="${cls!=='pending'?`color:${s.status==='QUARANTINED'?'var(--crit)':s.status==='DELAYED'?'var(--warn)':'inherit'}`:''}">${n.name}</div>
      <div class="s-time">${s.time||'—'}</div>
      <div class="s-detail">${s.detail||'이벤트 미수신'}</div>`;
    return st.outerHTML;
  });

  const segs = j.nodes.slice(0,-1).map((s,i)=>{
    const next = j.nodes[i+1];
    const dead = next.status==='PENDING';
    const c1 = nodeById(s.node).hex, c2 = dead?'#223052':nodeById(next.node).hex;
    const lat = (!dead && next.latency!=null) ? `<span class="lat ${next.latency>=2000?'slow':''}">+${(next.latency/1000).toFixed(1)}s</span>` : '';
    return `<div class="segment ${dead?'dead':''}" style="--c1:${c1};--c2:${c2}"><div class="track"></div>${lat}</div>`;
  });

  const lineHTML = j.nodes.map((_,i)=> stations[i] + (segs[i]||'')).join('');

  let reason = '';
  const blocked = j.nodes.find(s=>s.status==='QUARANTINED');
  const delayed = j.nodes.find(s=>s.status==='DELAYED');
  if(blocked){
    reason = `<div class="reason-card">
      <span class="chip crit">차단 사유</span>
      <div class="rc-body">
        <div class="rc-title">${nodeById(blocked.node).name}에서 격리되었습니다</div>
        <div class="rc-desc">${blocked.detail}<br>고객사 담당자는 이 화면으로 차단 사유를 즉시 확인할 수 있으며(FR-03), 조치 권한 보유 관리자는 아래 버튼으로 격리를 해제할 수 있습니다.</div>
      </div>
      <button class="btn danger" id="releaseBtn">격리 강제 해제</button>
    </div>`;
  } else if(delayed){
    reason = `<div class="reason-card warn">
      <span class="chip warn">병목 감지</span>
      <div class="rc-body">
        <div class="rc-title">${nodeById(delayed.node).name} 구간 정체 (Timeout 엔진 재시도)</div>

    </div>`;
  } else {
    reason = `<div class="reason-card ok">
      <span class="chip pass">정상</span>
      <div class="rc-body">
        <div class="rc-title">전 구간 통과 · 아카이빙 보관 완료</div>
        <div class="rc-desc">총 소요 ${(j.nodes.reduce((a,s)=>a+(s.latency||0),0)/1000).toFixed(1)}초 — 4개 노드 모두 정상 통과했습니다.</div>
      </div>
    </div>`;
  }

  d.innerHTML = `
    <div class="jd-head"><div class="subj">${j.meta.subject}</div>${stateChip(j.state)}</div>
    <div class="jd-meta">
      <div><div class="k">Message-ID</div><div class="v">${j.message_id.replace('<','&lt;').replace('>','&gt;')}</div></div>
      <div><div class="k">발신자</div><div class="v">${j.meta.sender}</div></div>
      <div><div class="k">수신자</div><div class="v">${j.meta.recipient}</div></div>
      <div><div class="k">최초 수신</div><div class="v">${j.meta.received_at}</div></div>
    </div>
    <div class="transit"><div class="t-line">${lineHTML}</div></div>
    ${reason}`;

  const rb = $('#releaseBtn');
  if(rb) rb.onclick = async ()=>{
    rb.disabled = true;
    try{
      await api('/api/v1/nodes/release', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message_id: j.message_id})});
      toast(`POST /api/v1/nodes/release → ${blocked.node} 격리 해제 완료 (감사 로그 기록: admin.kim)`, 'ok');
      await refreshJourneys();
    }catch(e){ toast('해제 실패: '+e.message, 'err'); rb.disabled=false; }
  };
}

function defaultEnd(){ return toLocalInput(new Date()); }
function toLocalInput(d){ const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }

async function loadSosSettings(){

function bindSosStorageCfg(){

function renderSosPicks(){
  $('#sosPicks').replaceChildren(...NODES.map(n=>{
    const b = el('button','npick'+(sosNodes.has(n.id)?' on':''));
    const discon = CONFIGURABLE_NODES.includes(n.id) && nodeConnected[n.id]===false;
    b.innerHTML = `<i class="nd" style="background:${n.hex}"></i>${n.name} <span class="mono" style="color:var(--dim)">${n.host}</span>${discon?' <span class="mono" style="color:var(--crit)">· 연결 끊김</span>':''}`;
    b.onclick = ()=>{ if(sosRunning) return; sosNodes.has(n.id)?sosNodes.delete(n.id):sosNodes.add(n.id); renderSosPicks(); renderSosSteps(); };
    return b;
  }));
}

const SOS_PHASE_LABELS = ['수집 명령 수신','로그 수집 (/var/log/*)','top · df 덤프','압축 및 전송'];
function renderSosSteps(perNode){
  $('#sosSteps').replaceChildren(...NODES.filter(n=>sosNodes.has(n.id)).map(n=>{
    const pn = perNode?.[n.id];
    const phase = pn ? pn.phase : -1;
    const box = el('div','sos-node');
    box.innerHTML = `<div class="nn"><i class="nd" style="width:9px;height:9px;border-radius:50%;background:${n.hex}"></i>${n.name}</div>
      <ul>${SOS_PHASE_LABELS.map((p,i)=>{
        const cls = phase===-2 ? 'failed' : (phase===99||phase>i ? 'done' : phase===i ? 'doing' : '');
        return `<li class="${cls}"><span class="ic"></span>${p}</li>`;
      }).join('')}</ul>`;
    return box;
  }));
}

async function runSos(){
  if(sosRunning) return;
  if(!sosNodes.size){ toast('수집 대상 노드를 1개 이상 선택하세요.','err'); return; }
  sosRunning = true; $('#sosRun').disabled = true; $('#sosResult').classList.remove('show','partial');
  const t0 = Date.now();
  const timerIv = setInterval(()=>{ $('#sosTimer').textContent = `경과 ${((Date.now()-t0)/1000).toFixed(1)}s`; }, 100);

  let job;
  try{
    job = await api('/api/v1/nodes/sos-package', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({start_time:$('#sosStart').value, end_time:$('#sosEnd').value, nodes:[...sosNodes]})});
  }catch(e){
    clearInterval(timerIv);
    toast('SOS 시작 실패: '+e.message, 'err');
    sosRunning=false; $('#sosRun').disabled=false;
    return;
  }
  toast('중앙서버 → 4개 Edge Agent 비동기 수집 명령 발송 (병렬)', 'ok');

  sosEventSource = new EventSource(`/api/v1/nodes/sos-package/${job.job_id}/events`);
  sosEventSource.onmessage = (ev)=>{ renderSosSteps(JSON.parse(ev.data).per_node); };
  sosEventSource.addEventListener('done', (ev)=>{
    const data = JSON.parse(ev.data);
    clearInterval(timerIv); sosEventSource.close();
    const took = ((Date.now()-t0)/1000).toFixed(1);
    if(data.state==='FAILED'){
      $('#sosTimer').textContent = `실패 · ${took}s`;
      toast('SOS 수집 전체 실패 — 재시도가 필요합니다.', 'err');
    } else {
      $('#sosTimer').textContent = `완료 · ${took}s`;
      $('#sosResultChip').textContent = data.state==='PARTIAL_DONE' ? '부분 완료' : '병합 완료';
      $('#sosResultChip').className = 'chip ' + (data.state==='PARTIAL_DONE' ? 'warn' : 'pass');
      $('#sosResult').classList.add('show', data.state==='PARTIAL_DONE' ? 'partial' : '');
      $('#sosFn').textContent = data.manifest;
      $('#sosFs').textContent = `SHA-256 ${data.sha256.slice(0,20)}… · ${(data.size_bytes/1024).toFixed(1)} KB · job ${job.job_id} · 저장 ${sosCfg.dir}`;
      $('#sosDl').onclick = ()=>{ window.location.href = `/api/v1/nodes/sos-package/${job.job_id}/download`; };
      toast(`SOS 패키지 ${data.state==='PARTIAL_DONE'?'부분 완료(일부 노드 실패)':'완료'} (${took}초) — 기존 40분 대비 대폭 단축`, data.state==='PARTIAL_DONE'?'warn':'ok');
      loadSosSettings();
    }
    sosRunning=false; $('#sosRun').disabled=false;
  });
}

/* ===== 실시간 스트림 (SSE) — 3초 폴링을 대체 =====
 * 뷰/탭 상태와 무관하게 계속 요청을 쏘던 기존 polling 대신, 연결 하나를 유지하며
 * 서버가 상태가 바뀔 때만 push한다. 탭이 백그라운드로 가면 연결을 끊어 자원을
 * 절약하고, 끊기면 사용자가 볼 수 있는 배지로 표시하며 지수 백오프로 재연결한다. */
let evtSource = null, reconnectDelay = 1000, journeysRefreshing = false;

function setConnStatus(status){
  const dot = $('#connDot'), label = $('#connLabel');
  if(!dot || !label) return;
  dot.style.animation = status==='online' ? '' : 'none';
  if(status==='online'){ dot.style.background='var(--pass)'; label.textContent='Edge Agent 4/4 연결 · 실시간 스트림'; }
  else if(status==='connecting'){ dot.style.background='var(--warn)'; label.textContent='실시간 연결 시도 중…'; }
  else{ dot.style.background='var(--crit)'; label.textContent=`연결 끊김 · ${Math.round(reconnectDelay/1000)}초 후 재시도`; }
}

function applyStreamPayload(p){
  if(p.connected) nodeConnected = {...nodeConnected, ...p.connected};
  if(p.health){ health = p.health; if(currentView==='overview'){ renderHealth(); renderNodeEndpointRows(); } }
  if(p.hourly && currentView==='overview') renderChart(p.hourly);
  if(p.alerts){ alerts = p.alerts; if(currentView==='overview') renderFeed(); if(currentView==='alert') renderAlertRows(); }
}

async function maybeRefreshJourneys(){
  if(currentView!=='journey' || journeysRefreshing) return;
  journeysRefreshing = true;
  try{ await refreshJourneys(); } finally{ journeysRefreshing = false; }
}

function connectStream(){
  if(document.hidden) return; // 탭이 보이지 않으면 연결하지 않음 — 불필요한 서버 부하 방지
  setConnStatus('connecting');
  evtSource = new EventSource('/api/v1/stream');
  evtSource.addEventListener('snapshot', ev=>{ applyStreamPayload(JSON.parse(ev.data)); reconnectDelay=1000; setConnStatus('online'); });
  evtSource.addEventListener('tick', ev=>{ applyStreamPayload(JSON.parse(ev.data)); reconnectDelay=1000; setConnStatus('online'); });
  evtSource.addEventListener('journeys_changed', ()=>{ maybeRefreshJourneys(); });
  evtSource.onerror = ()=>{
    evtSource.close();
    setConnStatus('offline');
    setTimeout(connectStream, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay*2, 15000); // 지수 백오프, 최대 15초
  };
}

document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){ evtSource?.close(); evtSource=null; }
  else if(!evtSource){ reconnectDelay=1000; connectStream(); }
});

async function boot(){
  try{
    const [al, th, wh, ne] = await Promise.all([
      api('/api/v1/alerts?limit=50'), api('/api/v1/alerts/thresholds'), api('/api/v1/settings/webhook'),
      api('/api/v1/settings/node-endpoints'),
    ]);
    alerts = al.items; thresholds = th; webhookCfg = wh;
    nodeEndpoints = ne.endpoints; nodeConnected = {...nodeConnected, ...ne.connected};
    applyNodeEndpointsToNodes();
  }catch(e){ toast('초기 데이터 로드 실패: '+e.message, 'err'); }
  views.overview();
  connectStream();
}
boot();
