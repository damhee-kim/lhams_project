<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Crinity Insight — 통합 메일 여정 관제 콘솔 프로토타입 (관제 현황·여정 추적·SOS 패키징·경보 설정)">
<title>Crinity Insight — 통합 메일 여정 관제</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230B1020'/%3E%3Ccircle cx='7' cy='8' r='2.4' fill='%234C8DFF'/%3E%3Ccircle cx='17' cy='8' r='2.4' fill='%2335C98E'/%3E%3Ccircle cx='12' cy='17' r='2.4' fill='%23F7B32B'/%3E%3Cpath d='M8.7 9.6L11 15.4M15.3 9.6L13 15.4M9.4 8H14.6' stroke='%238A97B5' stroke-width='1.3' fill='none'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#0B1020; --panel:#131A2C; --panel2:#0F1526; --line:#223052; --line-soft:#1A2440;
  --text:#E8EDF7; --muted:#8A97B5; --dim:#56618A;
  --webmail:#4C8DFF; --spam:#F7B32B; --mailbrk:#FF5D5D; --archive:#35C98E;
  --pass:#35C98E; --warn:#F7B32B; --crit:#FF5D5D; --pending:#56618A;
  --mono:"JetBrains Mono","SF Mono",ui-monospace,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:"Pretendard Variable",Pretendard,"Noto Sans KR",-apple-system,"Malgun Gothic",sans-serif;
  font-size:14px; letter-spacing:-0.01em;
  background-image:radial-gradient(1200px 600px at 80% -10%, rgba(76,141,255,.07), transparent 60%);
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:var(--text)}
::selection{background:rgba(76,141,255,.35)}

/* 키보드 포커스 접근성 — 리셋으로 사라진 기본 아웃라인을 브랜드 컬러로 대체 */
:focus{outline:none}
:focus-visible{outline:2px solid var(--webmail); outline-offset:2px; border-radius:4px}
.npick:focus-visible, .fchip:focus-visible, .jrow:focus-visible{outline-offset:0}

/* ===== 레이아웃 ===== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:224px;flex-shrink:0;background:var(--panel2);border-right:1px solid var(--line-soft);
  display:flex;flex-direction:column;padding:20px 0;position:sticky;top:0;height:100vh;
}
.logo{padding:4px 20px 22px;border-bottom:1px solid var(--line-soft)}
.logo .brand{font-weight:800;font-size:17px;letter-spacing:-.02em}
.logo .brand b{color:var(--webmail)}
.logo .sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.nav{padding:14px 10px;display:flex;flex-direction:column;gap:2px}
.nav button{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;
  color:var(--muted);font-weight:600;font-size:13.5px;text-align:left;transition:.15s;
}
.nav button:hover{background:rgba(255,255,255,.04);color:var(--text)}
.nav button.active{background:rgba(76,141,255,.13);color:#BBD4FF}
.nav button .dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0}
.nav button.active .dot{background:var(--webmail);box-shadow:0 0 8px rgba(76,141,255,.8)}
.side-foot{margin-top:auto;padding:14px 20px;border-top:1px solid var(--line-soft);font-size:11.5px;color:var(--dim);line-height:1.7}
.side-foot .role{display:inline-block;padding:2px 8px;border-radius:20px;background:rgba(53,201,142,.12);color:var(--archive);font-weight:700;font-size:11px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--line-soft);
  background:rgba(11,16,32,.8);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;
}
.topbar h1{font-size:16px;font-weight:800}
.env{font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:6px;background:rgba(247,179,43,.12);color:var(--warn);border:1px solid rgba(247,179,43,.3)}
.top-right{margin-left:auto;display:flex;align-items:center;gap:16px;font-size:12.5px;color:var(--muted)}
.live{display:flex;align-items:center;gap:7px}
.live .pulse{width:8px;height:8px;border-radius:50%;background:var(--pass);animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(53,201,142,.5)}70%{box-shadow:0 0 0 8px rgba(53,201,142,0)}100%{box-shadow:0 0 0 0 rgba(53,201,142,0)}}
.clock{font-family:var(--mono)}
.content{padding:24px 26px 60px;max-width:1240px;width:100%;margin:0 auto}
.view{display:none}
.view.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ===== 공통 컴포넌트 ===== */
.card{background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;padding:18px 20px}
.card h3{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:14px;letter-spacing:.02em}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:14px}
.section-gap{margin-top:14px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
.chip.pass{background:rgba(53,201,142,.13);color:var(--pass)}
.chip.crit{background:rgba(255,93,93,.13);color:var(--crit)}
.chip.warn{background:rgba(247,179,43,.13);color:var(--warn)}
.chip.pending{background:rgba(86,97,138,.18);color:#93A0C4}
.chip.info{background:rgba(76,141,255,.13);color:var(--webmail)}
.mono{font-family:var(--mono);font-size:12px}
.btn{
  padding:9px 16px;border-radius:9px;font-weight:700;font-size:13px;transition:.15s;
  background:var(--webmail);color:#fff;
}
.btn:hover{filter:brightness(1.12)}
.btn.ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}
.btn.danger{background:var(--crit)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.hint{font-size:12px;color:var(--dim);line-height:1.7}

/* ===== SCR-01 관제 현황 ===== */
.node-card{position:relative;overflow:hidden}
.node-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--nc)}
.node-card .name{font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:8px}
.node-card .name .st{margin-left:auto}
.node-card .host{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px}
.gauges{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.gauge{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:10px;font-size:11.5px}
.gauge .lbl{color:var(--muted);font-family:var(--mono)}
.gauge .val{text-align:right;font-family:var(--mono);color:var(--text)}
.bar{height:6px;border-radius:4px;background:var(--line-soft);overflow:hidden}
.bar i{display:block;height:100%;border-radius:4px;background:var(--nc);transition:width .8s ease}
.bar i.hot{background:var(--crit)!important}
.bar i.warm{background:var(--warn)!important}
.queue-line{margin-top:12px;display:flex;justify-content:space-between;align-items:baseline;border-top:1px dashed var(--line-soft);padding-top:10px}
.queue-line .q{font-family:var(--mono);font-size:18px;font-weight:700}
.queue-line .q.warm{color:var(--warn)} .queue-line .q.hot{color:var(--crit)}

.chart{display:flex;align-items:flex-end;gap:5px;height:120px;padding-top:6px}
.chart .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;height:100%}
.chart .b{border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--webmail),rgba(76,141,255,.25));min-height:3px}
.chart .b.blk{background:linear-gradient(180deg,var(--crit),rgba(255,93,93,.2))}
.chart-x{display:flex;gap:5px;margin-top:6px}
.chart-x span{flex:1;text-align:center;font-size:9.5px;color:var(--dim);font-family:var(--mono)}
.legend{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin-top:10px}
.legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}

.feed{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}
.feed-item{display:flex;gap:10px;padding:10px 12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line-soft);font-size:12.5px;line-height:1.55;animation:fade .3s}
.feed-item .sev{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.feed-item .t{color:var(--dim);font-family:var(--mono);font-size:11px}

/* ===== SCR-02 여정 추적 ===== */
.searchbar{display:flex;gap:10px;align-items:center}
.searchbar input[type=text]{
  flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:11px 14px;font-size:13.5px;outline:none;transition:.15s;
}
.searchbar input[type=text]:focus{border-color:var(--webmail);box-shadow:0 0 0 3px rgba(76,141,255,.15)}
.filters{display:flex;gap:8px;margin-top:12px}
.fchip{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;color:var(--muted);border:1px solid var(--line);transition:.15s}
.fchip:hover{color:var(--text)}
.fchip.on{background:rgba(76,141,255,.14);border-color:rgba(76,141,255,.5);color:#BBD4FF}
.jlist{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.jrow{
  display:grid;grid-template-columns:110px 1fr 200px 130px;gap:14px;align-items:center;
  padding:13px 16px;border-radius:11px;background:var(--panel);border:1px solid var(--line-soft);
  cursor:pointer;transition:.15s;text-align:left;width:100%;
}
.jrow:hover{border-color:var(--line);background:#17203A}
.jrow.sel{border-color:rgba(76,141,255,.6);background:rgba(76,141,255,.08)}
.jrow .subj{font-weight:700;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.jrow .from{font-size:11.5px;color:var(--muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.jrow .mini-line{display:flex;align-items:center;gap:0}
.jrow .mini-line .md{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.jrow .mini-line .ms{height:2px;width:16px;flex-shrink:0}
.jrow .time{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:right}
.empty{padding:40px;text-align:center;color:var(--dim)}

/* --- 시그니처: 노드별 타임라인 --- */
.journey-detail{margin-top:16px}
.jd-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.jd-head .subj{font-size:16px;font-weight:800}
.jd-meta{display:grid;grid-template-columns:repeat(4,auto);gap:6px 28px;margin-top:12px;font-size:12.5px}
.jd-meta .k{color:var(--dim);font-size:11px;margin-bottom:2px}
.jd-meta .v{font-family:var(--mono);font-size:12px}
.transit{margin-top:26px;padding:30px 10px 10px;overflow-x:auto}
.t-line{display:flex;align-items:flex-start;min-width:760px}
.station{display:flex;flex-direction:column;align-items:center;width:150px;flex-shrink:0;position:relative}
.station .s-dot{
  width:22px;height:22px;border-radius:50%;border:4px solid var(--sc);background:var(--bg);
  position:relative;z-index:2;transition:.3s;
}
.station.reached .s-dot{background:var(--sc);box-shadow:0 0 14px color-mix(in srgb,var(--sc) 60%,transparent)}
.station.blocked .s-dot{background:var(--crit);border-color:var(--crit);animation:blockPulse 1.4s infinite}
@keyframes blockPulse{0%{box-shadow:0 0 0 0 rgba(255,93,93,.55)}70%{box-shadow:0 0 0 12px rgba(255,93,93,0)}100%{box-shadow:0 0 0 0 rgba(255,93,93,0)}}
.station.pending .s-dot{border-color:var(--dim);border-style:dashed}
.station .s-name{margin-top:10px;font-weight:800;font-size:13px}
.station.pending .s-name{color:var(--dim)}
.station .s-time{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:3px}
.station .s-detail{font-size:11px;color:var(--muted);margin-top:5px;text-align:center;line-height:1.5;max-width:140px}
.station.blocked .s-detail{color:#FFB4B4}
.segment{flex:1;min-width:60px;height:22px;display:flex;align-items:center;position:relative;margin:0 -32px}
.segment .track{height:6px;width:100%;border-radius:3px;background:linear-gradient(90deg,var(--c1),var(--c2))}
.segment.dead .track{background:repeating-linear-gradient(90deg,var(--line) 0 8px,transparent 8px 16px);height:3px}
.segment .lat{
  position:absolute;top:-24px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:10px;
  background:var(--panel2);border:1px solid var(--line);color:var(--muted);white-space:nowrap;
}
.segment .lat.slow{color:var(--warn);border-color:rgba(247,179,43,.4)}
.reason-card{
  margin-top:18px;padding:16px 18px;border-radius:12px;display:flex;gap:14px;align-items:flex-start;
  background:rgba(255,93,93,.07);border:1px solid rgba(255,93,93,.25);
}
.reason-card.ok{background:rgba(53,201,142,.06);border-color:rgba(53,201,142,.25)}
.reason-card.warn{background:rgba(247,179,43,.07);border-color:rgba(247,179,43,.3)}
.reason-card .rc-body{flex:1}
.reason-card .rc-title{font-weight:800;font-size:13.5px;margin-bottom:4px}
.reason-card .rc-desc{font-size:12.5px;color:var(--muted);line-height:1.65}

/* ===== SCR-03 SOS ===== */
.sos-form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field label{display:block;font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:7px}
.field input[type=datetime-local]{
  width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;color-scheme:dark;
}
.node-picks{display:flex;gap:10px;flex-wrap:wrap}
.npick{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:9px;border:1px solid var(--line);font-size:12.5px;font-weight:700;color:var(--muted);transition:.15s}
.npick .nd{width:9px;height:9px;border-radius:50%}
.npick.on{border-color:rgba(76,141,255,.5);background:rgba(76,141,255,.09);color:var(--text)}
.sos-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.sos-node{border:1px solid var(--line-soft);border-radius:12px;padding:14px;background:var(--panel2)}
.sos-node .nn{font-weight:800;font-size:13px;display:flex;align-items:center;gap:8px}
.sos-node ul{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:7px}
.sos-node li{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);font-family:var(--mono)}
.sos-node li .ic{width:15px;height:15px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;font-size:9px}
.sos-node li.doing{color:var(--warn)} .sos-node li.doing .ic{border-color:var(--warn);animation:spinB 1s linear infinite}
@keyframes spinB{to{transform:rotate(360deg)}}
.sos-node li.done{color:var(--pass)} .sos-node li.done .ic{border-color:var(--pass);background:rgba(53,201,142,.15)}
.sos-node li.done .ic::after{content:"✓"}
.sos-result{margin-top:16px;display:none;align-items:center;gap:16px;padding:16px 18px;border-radius:12px;background:rgba(53,201,142,.07);border:1px solid rgba(53,201,142,.3)}
.sos-result.show{display:flex;animation:fade .3s}
.sos-result .fn{font-family:var(--mono);font-size:13px;font-weight:700}
.sos-result .fs{font-size:11.5px;color:var(--muted);margin-top:3px}
.timer{font-family:var(--mono);font-size:12px;color:var(--warn)}

/* ===== SCR-04 경보 ===== */
.th-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.th-item label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px}
.th-item label b{font-family:var(--mono);color:var(--text)}
.th-item input[type=range]{width:100%;accent-color:var(--webmail)}
.webhook-row{display:flex;gap:10px;margin-top:6px}
.webhook-row input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;outline:none;font-family:var(--mono);font-size:12px}
table.alert-table{width:100%;border-collapse:collapse;font-size:12.5px}
table.alert-table th{color:var(--dim);font-weight:700;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line-soft);font-size:11.5px}
table.alert-table td{padding:10px;border-bottom:1px solid var(--line-soft)}
table.alert-table td.mono{font-size:11.5px}

/* ===== SCR-05 아키텍처 ===== */
.arch-wrap{overflow-x:auto}
.arch-svg{min-width:820px;width:100%}

/* 토스트 */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast-item{padding:11px 20px;border-radius:11px;background:#1B2440;border:1px solid var(--line);font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.45);animation:fade .25s}
.toast-item.ok{border-color:rgba(53,201,142,.5)} .toast-item.err{border-color:rgba(255,93,93,.5)}

@media (max-width:1000px){
  .grid4{grid-template-columns:repeat(2,1fr)} .grid2{grid-template-columns:1fr}
  .sos-steps{grid-template-columns:repeat(2,1fr)} .th-grid{grid-template-columns:1fr}
  .sidebar{width:70px} .logo .brand,.logo .sub,.nav button span.lb,.side-foot{display:none}
  .jrow{grid-template-columns:1fr 130px}
  .jrow .mini-line,.jrow .time{display:none}
}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <div class="brand">Crinity <b>Insight</b></div>
      <div class="sub">Meta Control Tower v1.0</div>
    </div>
    <nav class="nav" id="nav">
      <button data-view="overview" class="active" type="button"><i class="dot"></i><span class="lb">관제 현황</span></button>
      <button data-view="journey" type="button"><i class="dot"></i><span class="lb">메일 여정 추적</span></button>
      <button data-view="sos" type="button"><i class="dot"></i><span class="lb">SOS 로그 패키징</span></button>
      <button data-view="alert" type="button"><i class="dot"></i><span class="lb">여정 경보 설정</span></button>
      <button data-view="arch" type="button"><i class="dot"></i><span class="lb">시스템 아키텍처</span></button>
      <button data-view="dev" type="button"><i class="dot"></i><span class="lb">개발 가이드</span></button>
    </nav>
    <div class="side-foot">
      접속 계정 <span class="role">ENGINEER</span><br>
      admin.kim@crinity.com<br>
      <span style="font-family:var(--mono)">RBAC: 조치 권한 보유</span>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1 id="viewTitle">관제 현황</h1>
      <span class="env">PROTOTYPE · MOCK DATA</span>
      <span class="env" style="background:rgba(76,141,255,.10);color:var(--webmail);border-color:rgba(76,141,255,.3)">CUSTOMER: K-Enterprise · 내부망</span>
      <div class="top-right">
        <div class="live"><i class="pulse"></i>Edge Agent 4/4 연결 · 3초 폴링</div>
        <div class="clock" id="clock" aria-live="off">--:--:--</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="toast" aria-live="polite"></div>
<script>
/* ─────────────────────────────────────────────────────────────────────────
 * Crinity Insight — 관리자 대시보드 프로토타입 (v1.2, 세미나 데모용)
 * ─────────────────────────────────────────────────────────────────────────
 * 목적   : UI/UX·데이터 흐름 검증용 단일 파일 프로토타입 (외부 의존성 0건)

/* §2 UTIL ──────────────────────────────────────────────────────────────
 * DOM 헬퍼($/el), 상태 칩(stateChip), 토스트. 실구현 React 이관 시
 * stateChip → <StateChip/>, toast → 전역 Toast 컨텍스트로 대체. */
const $ = s => document.querySelector(s);
const el = (tag, cls, html) => {const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;};
const stateChip = s => ({
  ARCHIVED:'<span class="chip pass">보관 완료</span>', PASS:'<span class="chip pass">통과</span>',
  QUARANTINED:'<span class="chip crit">격리됨</span>', DELAYED:'<span class="chip warn">지연</span>',
  PENDING:'<span class="chip pending">미도달</span>', RELEASED:'<span class="chip info">해제됨</span>',
}[s]||s);
function toast(msg, kind){ const t=el('div','toast-item '+(kind||''), msg); $('#toast').appendChild(t); setTimeout(()=>t.remove(), 3200); }
function sevColor(s){return s==='CRITICAL'?'var(--crit)':s==='WARNING'?'var(--warn)':'var(--webmail)';}

/**
 * 장비 연결 설정 카드 — 실구현 매핑: GET/PUT /api/v1/settings/node-endpoints/{node}
 * 목업이므로 실제 TCP 연결 대신 setTimeout으로 결과를 랜덤 시뮬레이션한다(§9 참고 패턴과 동일).
 */
function renderNodeEndpointRows(){
  const wrap = $('#nodeEndpointRows'); if(!wrap) return;
  wrap.replaceChildren(...CONFIGURABLE_NODES.map(nid=>{
    const n = nodeById(nid);
    const ep = nodeEndpoints[nid];
    const c = nodeConnected[nid];
    const badge = !ep.host ? '<span class="chip pending">미설정</span>'
                : c===true ? '<span class="chip pass">연결됨</span>'
                : c===false ? '<span class="chip crit">연결 끊김</span>'
                : '<span class="chip pending">확인 중</span>';
    const row = el('div');
    row.style.cssText = 'display:grid;grid-template-columns:130px 1fr 100px auto auto;gap:10px;align-items:center';
    row.innerHTML = `
      <div style="font-weight:700;font-size:13px"><i style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${n.hex};margin-right:7px"></i>${n.name}</div>
      <input data-f="host" value="${ep.host}" placeholder="IP 또는 호스트명을 입력하세요 (예: 10.10.1.12)" spellcheck="false"
        style="background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:12px">
      <input data-f="port" type="number" min="1" max="65535" value="${ep.port}" placeholder="Port"
        style="background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:12px">
      <span data-badge>${badge}</span>
      <button class="btn ghost" data-save>저장 · 연결 확인</button>`;
    row.querySelector('[data-save]').onclick = ()=>{
      const host = row.querySelector('[data-f="host"]').value.trim();
      const port = row.querySelector('[data-f="port"]').value;
      if(!host || !port){ toast('IP·Port를 모두 입력하세요.','err'); return; }
      nodeEndpoints[nid] = {host, port};
      nodeConnected[nid] = null;
      n.host = `${host}:${port}`;
      renderNodeEndpointRows();
      toast(`PUT /api/v1/settings/node-endpoints/${nid} → 연결 확인 중… (실TCP 연결 시도)`, 'ok');
      setTimeout(()=>{
        // MOCK: 실구현은 asyncio.open_connection 실제 결과. 목업은 70% 확률로 성공 시뮬레이션.
        nodeConnected[nid] = Math.random() < 0.7;
        renderNodeEndpointRows(); renderHealth();
        toast(`${n.name} ${nodeConnected[nid] ? '연결됨' : '연결 안 됨(응답 없음)'}`, nodeConnected[nid] ? 'ok' : 'err');
      }, 700);
    };
    return row;
  }));
}

function renderHealth(){
  const wrap = $('#healthCards'); if(!wrap) return;
  wrap.replaceChildren(...NODES.map(n=>{
    const h = health[n.id];
    const disconnected = CONFIGURABLE_NODES.includes(n.id) && nodeConnected[n.id]===false;
    const cls = p => p>=90?'hot':p>=80?'warm':'';
    const qcls = h.queue>=1000?'hot':h.queue>=500?'warm':'';
    const card = el('div','card node-card');
    card.style.setProperty('--nc', n.color);
    if(disconnected) card.style.opacity = '.55';
    card.innerHTML = `
      <div class="name">${n.name}<span class="st">${disconnected?'<span class="chip crit">연결 끊김</span>':h.disk>=90||h.queue>=1000?'<span class="chip crit">경보</span>':h.disk>=80?'<span class="chip warn">주의</span>':'<span class="chip pass">정상</span>'}</span></div>
      <div class="host">${n.id} · ${n.host}</div>
      <div class="gauges">
        ${[['CPU',h.cpu],['MEM',h.mem],['DISK',h.disk]].map(([k,p])=>`
          <div class="gauge"><span class="lbl">${k}</span>
            <div class="bar"><i class="${cls(p)}" style="width:${p}%"></i></div>
            <span class="val">${p}%</span></div>`).join('')}
      </div>
      <div class="queue-line"><span class="hint">메일 큐 대기</span><span class="q ${qcls}">${h.queue.toLocaleString()}<small style="font-size:11px;color:var(--dim)"> 건</small></span></div>`;
    return card;
  }));
}

};

function journeyMatches(j){
  if(jFilter!=='ALL' && j.state!==jFilter && !(jFilter==='QUARANTINED'&&j.state==='RELEASED')) return false;
  if(!jKeyword) return true;
  const k = jKeyword.toLowerCase();
  return [j.message_id, j.meta.sender, j.meta.recipient, j.meta.subject].some(s=>s.toLowerCase().includes(k));
}

function miniLine(j){
  return `<div class="mini-line">${j.nodes.map((s,i)=>{
    const n=nodeById(s.node);
    const c = s.status==='PENDING' ? 'var(--line)' : s.status==='QUARANTINED' ? 'var(--crit)' : s.status==='DELAYED' ? 'var(--warn)' : n.color;
    const seg = i<j.nodes.length-1 ? `<i class="ms" style="background:${s.status==='PENDING'?'var(--line-soft)':c}"></i>` : '';
    return `<i class="md" style="background:${c};${s.status==='PENDING'?'opacity:.35':''}"></i>${seg}`;
  }).join('')}</div>`;
}

function renderJList(){
  const list = $('#jList'); if(!list) return;
  const rows = JOURNEYS.filter(journeyMatches);
  if(!rows.length){ list.replaceChildren(el('div','empty','조건에 해당하는 메일 여정이 없습니다. 키워드나 상태 필터를 조정해 보세요.')); return; }
  list.replaceChildren(...rows.map(j=>{
    const r = el('button','jrow'+(selectedJourney===j?' sel':''));
    r.type = 'button';
    r.innerHTML = `
      <div>${stateChip(j.state)}</div>
      <div><div class="subj">${j.meta.subject}</div><div class="from">${j.meta.sender} → ${j.meta.recipient}</div></div>
      ${miniLine(j)}
      <div class="time">${j.meta.received_at}</div>`;
    r.onclick = ()=>{ selectedJourney=j; renderJList(); renderJDetail(); };
    return r;
  }));
}

/**
 * 여정 상세 — 노드별 타임라인 렌더 (시그니처 컴포넌트)
 * @spec FR-02(타임라인)·FR-03(차단 사유)·FR-04(격리 해제)
 * 상태별 스타일링: reached(노드에 도착) / blocked(정지 표시) / pending(진행 대기)
 * 구간(segment): from→to 노드의 그라디언트, PENDING 이후는 점선(dead)
 * React 이관 시 <JourneyTimeline nodes={...}/> 단일 컴포넌트로 추출 권장
 */
function renderJDetail(){
  const d = $('#jDetail'); if(!d) return;
  const j = selectedJourney;
  if(!j){ d.innerHTML='<div class="empty">목록에서 메일을 선택하면 여정 타임라인이 표시됩니다.</div>'; return; }
  const blockedIdx = j.nodes.findIndex(s=>s.status==='QUARANTINED'||s.status==='DELAYED');

  const stations = j.nodes.map((s,i)=>{
    const n = nodeById(s.node);
    const cls = s.status==='QUARANTINED' ? 'blocked' : s.status==='PENDING' ? 'pending' : 'reached';
    const st = el('div',`station ${cls}`);
    st.style.setProperty('--sc', s.status==='DELAYED' ? 'var(--warn)' : n.color);
    st.innerHTML = `<div class="s-dot"></div>
      <div class="s-name" style="${cls!=='pending'?`color:${s.status==='QUARANTINED'?'var(--crit)':s.status==='DELAYED'?'var(--warn)':'inherit'}`:''}">${n.name}</div>
      <div class="s-time">${s.time||'—'}</div>
      <div class="s-detail">${s.detail||'이벤트 미수신'}</div>`;
    return st.outerHTML;
  });

  const segs = j.nodes.slice(0,-1).map((s,i)=>{
    const next = j.nodes[i+1];
    const dead = next.status==='PENDING';
    const c1 = nodeById(s.node).hex, c2 = dead?'#223052':nodeById(next.node).hex;
    const lat = (!dead && next.latency!=null) ? `<span class="lat ${next.latency>=2000?'slow':''}">+${(next.latency/1000).toFixed(1)}s</span>` : '';
    return `<div class="segment ${dead?'dead':''}" style="--c1:${c1};--c2:${c2}"><div class="track"></div>${lat}</div>`;
  });

  const lineHTML = j.nodes.map((_,i)=> stations[i] + (segs[i]||'')).join('');

  let reason = '';
  const blocked = j.nodes.find(s=>s.status==='QUARANTINED');
  const delayed = j.nodes.find(s=>s.status==='DELAYED');
  if(blocked){
    reason = `<div class="reason-card">
      <span class="chip crit">차단 여정</span>
      <div class="rc-body">
        <div class="rc-title">${nodeById(blocked.node).name}에서 격리되었습니다</div>
        <div class="rc-desc">${blocked.detail}<br>고객사 담당자는 이 화면으로 차단 여정을 즉시 확인할 수 있으며(FR-03), 조치 권한 보유 시 아래 버튼으로 격리를 해제할 수 있습니다.</div>
      </div>
      <button class="btn danger" id="releaseBtn" type="button">격리 강제 해제</button>
    </div>`;
  } else if(delayed){
    reason = `<div class="reason-card warn">
      <span class="chip warn">병목 감지</span>
      <div class="rc-body">
        <div class="rc-title">${nodeById(delayed.node).name} 구간 정체 (Timeout 엔진 후행)</div>
        <div class="rc-desc">${delayed.detail}<br>다음 노드 미도달 상태가 지속되어 백엔드 Timeout 엔진이 지연으로 판정했습니다. 관제 현황의 큐 지표를 함께 확인하세요.</div>
      </div>
    </div>`;
  } else {
    reason = `<div class="reason-card ok">
      <span class="chip pass">정상</span>
      <div class="rc-body">
        <div class="rc-title">전 구간 통과 · 아카이빙 보관 완료</div>
        <div class="rc-desc">총 소요 ${(j.nodes.reduce((a,s)=>a+(s.latency||0),0)/1000).toFixed(1)}초 — 4개 노드 모두 정상 통과했습니다.</div>
      </div>
    </div>`;
  }

  d.innerHTML = `
    <div class="jd-head"><div class="subj">${j.meta.subject}</div>${stateChip(j.state)}</div>
    <div class="jd-meta">
      <div><div class="k">Message-ID</div><div class="v">${j.message_id.replace('<','&lt;').replace('>','&gt;')}</div></div>
      <div><div class="k">발신자</div><div class="v">${j.meta.sender}</div></div>
      <div><div class="k">수신자</div><div class="v">${j.meta.recipient}</div></div>
      <div><div class="k">최초 수신</div><div class="v">${j.meta.received_at}</div></div>
    </div>
    <div class="transit"><div class="t-line">${lineHTML}</div></div>
    ${reason}`;

  const rb = $('#releaseBtn');
  if(rb) rb.onclick = ()=>{
    const b = j.nodes.find(s=>s.status==='QUARANTINED');
    b.status='PASS'; b.detail += ' — 관리자 해제(admin.kim)';
    j.state='RELEASED';
    toast(`POST /api/v1/nodes/release — ${b.node} 격리 해제 완료 (감사 로그 기록: admin.kim)`, 'ok');
    renderJList(); renderJDetail();
  };
}

/* §5 SCR-03 SOS 패키징 ───────────────────────────────────────── FR-05, FR-06
 * MOCK: runSos()가 550ms 틱 랜덤 진행 + Blob manifest 다운로드
 * REAL: POST /nodes/sos-package → job_id → GET .../{job_id}/events (SSE)
 *       상태 머신 CREATED→DISPATCHED→COLLECTING→UPLOADING→MERGING→DONE
 *       부분 실패 PARTIAL_DONE 케이스 UI 표시 (보안명세 §3.1) */
let sosNodes = new Set(NODES.map(n=>n.id)), sosRunning=false;

/* ── SOS 저장 설정 (M2-F9 신설) ──────────────────────────────────────────
 * MOCK: 세션 메모리(sosCfg)에만 저장 / REAL: GET·PUT /api/v1/settings/sos-storage
 * 보안 핵심: 경로를 tar·mkdir 인자로 넘기면 → 아래 검증은 UX용 1차 방어일 뿐,
 * 실구현에서는 반드시 서버측에서 동일 규칙 + 실제 쓰기·여유공간 검사 후
 * systemd ReadWritePaths 화이트리스트와 대조한다 (보안명세 §3.4/§5.3) */
let sosCfg = { dir:'/var/lib/insight/sos-packages', retentionDays:30, maxGb:50 };
const SOS_FORBIDDEN = ['/', '/etc', '/boot', '/proc', '/sys', '/dev', '/run',
                       '/bin', '/sbin', '/usr', '/lib', '/lib64', '/root'];
/**
 * 저장 경로 1차 검증 (클라이언트 UX용 — 서버측 검증과 동일 규칙)
 * @returns {{ok:boolean, msg:string}}
 */
function validateSosPath(p){
  p = (p||'').trim();
  if(!p.startsWith('/'))               return {ok:false, msg:'절대 경로(/로 시작)만 허용됩니다.'};
  if(p.includes('..'))                 return {ok:false, msg:"상위 이동 시퀀스('..')는 허용되지 않습니다 (Path Traversal 차단)."};
  if(!/^[A-Za-z0-9/_.\-]+$/.test(p))  return {ok:false, msg:'경로에는 영문·숫자·/ _ . - 만 사용할 수 있습니다 (명령 주입 차단).'};
  if(/\/{2,}/.test(p))                return {ok:false, msg:'연속된 슬래시는 허용되지 않습니다.'};
  const norm = p.replace(/\/+$/,'') || '/';
  if(SOS_FORBIDDEN.some(f => norm === f || (f !== '/' && norm.startsWith(f + '/'))))
                                       return {ok:false, msg:`시스템 디렉토리(${norm.split('/').slice(0,2).join('/')}) 하위에는 저장할 수 없습니다.`};
  if(norm.length > 200)                return {ok:false, msg:'경로가 너무 깁니다 (200자 이내).'};
  return {ok:true, msg:norm};
}

const SOS_PHASES = ['수집 명령 수신','로그 수집 (/var/log/*)','top · df 덤프','압축 및 전송'];
function renderSosSteps(stateMap){
  $('#sosSteps').replaceChildren(...NODES.filter(n=>sosNodes.has(n.id)).map(n=>{
    const st = stateMap?.[n.id] ?? -1; // -1 대기, k 진행중 idx, 99 완료
    const box = el('div','sos-node');
    box.innerHTML = `<div class="nn"><i class="nd" style="width:9px;height:9px;border-radius:50%;background:${n.hex}"></i>${n.name}</div>
      <ul>${SOS_PHASES.map((p,i)=>{
        const cls = st===99||st>i ? 'done' : st===i ? 'doing' : '';
        return `<li class="${cls}"><span class="ic"></span>${p}</li>`;
      }).join('')}</ul>`;
    return box;
  }));
}

/**
 * SOS 수집 시뮬레이터 — 실구현에서는 이 함수 전체가 아래로 대체됨:
 *   const {job_id} = await post('/api/v1/nodes/sos-package', {...});
 *   new EventSource(`/api/v1/nodes/sos-package/${job_id}/events`)
 *     .onmessage = e => renderSosSteps(JSON.parse(e.data).per_node);
 * @spec FR-05/06, 보안명세 §3.1 (상태 머신·PARTIAL_DONE)
 */
function runSos(){
  if(sosRunning) return;
  if(!sosNodes.size){ toast('수집 대상 노드를 1개 이상 선택하세요.','err'); return; }
  sosRunning = true; $('#sosRun').disabled = true; $('#sosResult').classList.remove('show');
  const t0 = Date.now();
  const timerIv = setInterval(()=>{ $('#sosTimer').textContent = `경과 ${( (Date.now()-t0)/1000 ).toFixed(1)}s`; }, 100);
  const stateMap = {}; [...sosNodes].forEach(id=> stateMap[id]=0);
  toast('운영서버 — 4개 Edge Agent 비동기 수집 명령 발송 (병렬)', 'ok');

  const iv = setInterval(()=>{
    let allDone = true;
    for(const id of sosNodes){
      if(stateMap[id]===99) continue;
      // 노드별 랜덤 진행
      if(Math.random() > 0.35) stateMap[id]++;
      if(stateMap[id] >= SOS_PHASES.length) stateMap[id]=99;
      if(stateMap[id]!==99) allDone = false;
    }
    renderSosSteps(stateMap);
    if(allDone){
      clearInterval(iv); clearInterval(timerIv);
      const took = ((Date.now()-t0)/1000).toFixed(1);
      $('#sosTimer').textContent = `완료 — ${took}s`;
      const fn = `sos_package_20260713_1300-1430.tar.gz`;
      $('#sosFn').textContent = fn;
      $('#sosFs').textContent = `저장 위치 ${sosCfg.dir}/${fn} · ${sosNodes.size}개 노드 병합 · 147.2 MB · SHA-256 검증 · 보관 ${sosCfg.retentionDays}일 · 실행자 admin.kim`;
      $('#sosResult').classList.add('show');
      $('#sosDl').onclick = ()=> downloadManifest(fn, took);
      toast(`SOS 패키지 완료 (${took}초) — 기존 40분 대비 단축`, 'ok');
      sosRunning=false; $('#sosRun').disabled=false;
    }
  }, 550);
}

function downloadManifest(fn, took){
  const lines = [
    '# Crinity Insight — SOS Package Manifest (프로토타입 데모)',
    `# job_id: SOS-20260713-0007 / 실행자: admin.kim / 소요: ${took}s`,
    `# 대상 구간: 2026-07-13 13:00 ~ 14:30`,
    `# 저장 위치: ${sosCfg.dir} (보관 ${sosCfg.retentionDays}일 · 상한 ${sosCfg.maxGb}GB)`, '',
    ...[...sosNodes].map(id=>{
      const n=nodeById(id);
      return [`[${id}] ${n.host}`, `  var/log/maillog.13-1300_1430.gz`, `  var/log/messages.13-1300_1430.gz`, `  dump/top_${id.toLowerCase()}.txt`, `  dump/df_${id.toLowerCase()}.txt`, ''].join('\n');
    }),
  ].join('\n');
  const blob = new Blob([lines], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = fn.replace('.tar.gz','_manifest.txt');
  a.click(); URL.revokeObjectURL(a.href);
}

/* 3초 폴링 시뮬레이션: 헬스 지표 미세 변동 */
setInterval(()=>{
  for(const id in health){
    const h = health[id];
    h.cpu  = Math.min(99, Math.max(5, h.cpu + (Math.random()*6-3)|0));
    h.mem  = Math.min(99, Math.max(20, h.mem + (Math.random()*4-2)|0));
    h.queue = Math.max(0, h.queue + ((Math.random()*40-18)|0));
  }
  renderHealth();
}, 3000);

  const now = new Date().toTimeString().slice(0,8);
  alerts.unshift({t:now, node:'MailBreaker', sev:'CRITICAL', msg:'격리 이벤트 발생 — DLP 룰 매칭 (주민등록번호)', ch:'Slack #ops-alert'});

}, 8000);
